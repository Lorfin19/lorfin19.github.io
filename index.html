<!DOCTYPE html>
<html style="text-align: center; background-color: blue; color: cyan; font-family: Montserrat;">
    <title>
        lorfinfurball.com
    </title>
  <style>
    #hamnav {
      position: relative;
    }

      #hamnav {
      width: 100%;
      background: cyan;
    }

    /* (B) HORIZONTAL MENU ITEMS */
    #hamitems { display: flex; }
    #hamitems a {
      flex-grow: 1;
      flex-basis: 0;
      padding: 5px;
      color: blue;
      text-decoration: none;
      text-align: center;
      float: right;
    }
    #hamitems a:hover { background: blue; color: cyan; }

    /* (C) HIDE HAMBURGER */
    #hamnav label, #hamburger { display: none; }

    
      /* (B) SHOW HAMBURGER ICON */
      #hamnav label { 
        display: inline-block; 
        color: blue;
        font-style: normal;
        font-size: 1.2em;
        float: right;
      }

      /* (C) TOGGLE SHOW/HIDE MENU */
      #hamitems { display: none; }
      #hamnav input:checked ~ #hamitems { display: block; }
    }
  </style>

  <div style="overflow: hidden; background-color: cyan; display: block; color: cyan; padding: 14px 20px; text-decoration: none; height: 120px; position: sticky;">
    <div class="navbar">
      <div style="float:left;">
        <div class="padding10 center">
          <a href="https://lorfin19.github.io" class="smallBold">
              <img src="Lorfinfurball Logo.png" width="100" height="100" alt class="frame-shadow">
              <br>
              lorfinfurball.com
          </a>
      </div>
      </div>
      
            <!-- (A) MENU WRAPPER -->
      <nav id="hamnav">
        <!-- (B) THE HAMBURGER -->
        <label for="hamburger">&#9776;</label>
        <input type="checkbox" id="hamburger"/>
      
        <!-- (C) MENU ITEMS -->
        <div id="hamitems">
          <a href="https://lorfin19.github.io/media" target="_blank" class="smallBold">
            <img src="Media.png" width="25" height="25" alt class="frame-shadow">Media</a>
          <a href="https://lorfin19.github.io/videogames" target="_blank" class="smallBold">
            <img src="Game Controller.png" width="25" height="25" alt class="frame-shadow">Video Games</a>
        </div>
      </nav>
    </div>
    </div>
    <style>
      html{
          background-image:url("Lorfinfurball Web.jpg");
          background-repeat:no-repeat;
          background-size:cover;
      }
  </style>
