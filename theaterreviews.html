<!DOCTYPE html>
<html style="text-align: center; background-color: cyan; color: blue; font-family: Montserrat;">
    <title>
        Musical Soundtrack Reviews
    </title>
    <body>
      <div class="dropdown">
        <style>
            .dropbtn {
          background-color: blue;
          color: rgb(0, 0, 0);
          padding: 5px;
          font-size: 14px;
          border: none;
        }
        
        .dropdown {
          position: relative;
          display: inline-block;
        }
        
        /* Dropdown Content (Hidden by Default) */
        .dropdown-content {
          display: none;
          position: absolute;
          background-color: blue;
          width: 100px;
          box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
          z-index: 1;
        }
        
        /* Links inside the dropdown */
        .dropdown-content a {
          color: white;
          padding: 12px 16px;
          text-decoration: none;
          display: block;
        }
        
        /* Change color of dropdown links on hover */
        .dropdown-content a:hover {background-color: cyan; color: black;}
        
        /* Show the dropdown menu on hover */
        .dropdown:hover .dropdown-content {display: block;}
        
        /* Change the background color of the dropdown button when the dropdown content is shown */
        .dropdown:hover .dropbtn {background-color: cyan;}
        </style>
