<!DOCTYPE html>
<html style="text-align: center; font-family: Montserrat;">
        <title>
           lorfinfurball.com/oceancraft
        </title>

        <style>
            /* [ON BIG SCREEN] */
            /* (A) WRAPPER */
            #hamnav {
            width: 100%;
            background: white;
            }
      
            /* (B) HORIZONTAL MENU ITEMS */
            #hamitems { display: flex; }
            #hamitems a {
            flex-grow: 1;
            flex-basis: 0;
            padding: 10px;
            color: red;
            text-decoration: none;
            text-align: center;
            }
            #hamitems a:hover { background: red; color: black;}
      
            /* (C) HIDE HAMBURGER */
            #hamnav label, #hamburger { display: none; }
      
                            /* [ON SMALL SCREENS] */
            @media screen and (max-width: 768px){
            /* (A) BREAK INTO VERTICAL MENU */
            #hamitems a {
                box-sizing: border-box;
                display: block;
                width: 100%;
                border-top: 1px solid #333;
            }
            
            /* (B) SHOW HAMBURGER ICON */
            #hamnav label { 
                display: inline-block; 
                color: black;
                font-style: normal;
                font-size: 1.2em;
                padding: 10px;
            }
      
            /* (C) TOGGLE SHOW/HIDE MENU */
            #hamitems { display: none; }
            #hamnav input:checked ~ #hamitems { display: block; }
            }
          </style>
      
      
      <div style="overflow: hidden; background-color: rgb(154, 1, 1); display: block; color: cyan; padding: 14px 20px; text-decoration: none; height: 150px;">
          <div class="navbar">
            <div style="float: left;">
              <a href="https://lorfin19.github.io/uncraftablesmp" class="smallBold"><img src="Uncraftable.png" width="100" height="100" alt class="frame-shadow"></a>
            </div>
            <div style="float: right;">
      
                <!-- (A) MENU WRAPPER -->
          <nav id="hamnav">
            <!-- (B) THE HAMBURGER -->
            <label for="hamburger">&#9776;</label>
            <input type="checkbox" id="hamburger"/>
          
            <!-- (C) MENU ITEMS -->
            <div id="hamitems">
    
                <a href="https://lorfin19.github.io/usinfo">Info</a>
                <a href="https://lorfin19.github.io/usplayers">Players</a>
                <a href="https://lorfin19.github.io/uscoordinates">Coordinates</a>
            </div>
          </nav>
        </div>
          </div>
          </div>
        <style>
            body{
                background-image:url("Uncraftable.png");
                background-repeat:no-repeat;
                background-size:cover;
                background-color: rgb(154, 1, 1);
            }
        </style>
        <p>
            <h1>
                <b>
                    <u>
                        Welcome to the Official Uncraftable SMP Website!
                    </u>
                </b>
            </h1>
        </p>
        <p>
            <h3>
                Here, you can find information about the Minecraft world called Uncraftable SMP.
            </h3>
        </p>
    </body>
</html>
