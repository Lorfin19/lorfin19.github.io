<!DOCTYPE html>
<html style="text-align: center; font-family: Montserrat; color: cyan;">
        <title>
           lorfinfurball.com/oceancraft
        </title>

        <style>
            /* [ON BIG SCREEN] */
            /* (A) WRAPPER */
            #hamnav {
            width: 100%;
            background: cyan;
            }
      
            /* (B) HORIZONTAL MENU ITEMS */
            #hamitems { display: flex; }
            #hamitems a {
            flex-grow: 1;
            flex-basis: 0;
            padding: 10px;
            color: blue;
            text-decoration: none;
            text-align: center;
            }
            #hamitems a:hover { background: cyan; }
      
            /* (C) HIDE HAMBURGER */
            #hamnav label, #hamburger { display: none; }
      
                            /* [ON SMALL SCREENS] */
            @media screen and (max-width: 768px){
            /* (A) BREAK INTO VERTICAL MENU */
            #hamitems a {
                box-sizing: border-box;
                display: block;
                width: 100%;
                border-top: 1px solid #333;
            }
            
            /* (B) SHOW HAMBURGER ICON */
            #hamnav label { 
                display: inline-block; 
                color: blue;
                background: cyan;
                font-style: normal;
                font-size: 1.2em;
                padding: 10px;
            }
      
            /* (C) TOGGLE SHOW/HIDE MENU */
            #hamitems { display: none; }
            #hamnav input:checked ~ #hamitems { display: block; }
            }
          </style>
      
      
      <div style="overflow: hidden; background-color: cyan; display: block; color: cyan; padding: 14px 20px; text-decoration: none; height: 130px;">
          <div class="navbar">
            <div style="float: left;">
              <a href="https://lorfin19.github.io/oceancraft" target="_blank" class="smallBold"><img src="bleb.png" width="100" height="100" alt class="frame-shadow"></a>
            </div>
            <div style="float: right;">
      
                <!-- (A) MENU WRAPPER -->
          <nav id="hamnav">
            <!-- (B) THE HAMBURGER -->
            <label for="hamburger">&#9776;</label>
            <input type="checkbox" id="hamburger"/>
          
            <!-- (C) MENU ITEMS -->
            <div id="hamitems">
    
                <a href="https://lorfin19.github.io/oceancraft">Main Page</a>
                <a href="https://lorfin19.github.io/ocinfo">Info</a>
                <a href="https://lorfin19.github.io/ocplayers">Players</a>
            </div>
          </nav>
        </div>
          </div>
          </div>
