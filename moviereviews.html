<!DOCTYPE html>
<html style="text-align: center; background-color: yellow; color: black;">
    <title>
        Movie Musical Soundtrack Reviews

    <body>
      <div class="dropdown">
        <style>
            .dropbtn {
          background-color: black;
          color: rgb(0, 0, 0);
          padding: 5px;
          font-size: 14px;
          border: none;
        }
        
        .dropdown {
          position: relative;
          display: inline-block;
        }
        
        /* Dropdown Content (Hidden by Default) */
        .dropdown-content {
          display: none;
          position: absolute;
          background-color: black;
          width: 135px;
          box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
          z-index: 1;
        }
        
        /* Links inside the dropdown */
        .dropdown-content a {
          color: white;
          padding: 12px 12px;
          text-decoration: none;
          display: block;
        }
        
        /* Change color of dropdown links on hover */
        .dropdown-content a:hover {background-color: yellow; color: black;}
        
        /* Show the dropdown menu on hover */
        .dropdown:hover .dropdown-content {display: block;}
        
        /* Change the background color of the dropdown button when the dropdown content is shown */
        .dropdown:hover .dropbtn {background-color: yellow;}
        </style>
