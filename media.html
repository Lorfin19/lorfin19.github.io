<!DOCTYPE html>
<html style="text-align: center; background-color: cyan; color: blue; font-family: Montserrat;">
    <title>
        lorfinandmoosey.com/media
    </title>

    <style>
      /* [ON BIG SCREEN] */
      /* (A) WRAPPER */
      #hamnav {
      width: 100%;
      background: cyan;
      }

      /* (B) HORIZONTAL MENU ITEMS */
      #hamitems { display: flex; }
      #hamitems a {
      flex-grow: 1;
      flex-basis: 0;
      padding: 10px;
      color: blue;
      text-decoration: none;
      text-align: center;
      }
      #hamitems a:hover { background: cyan; }

      /* (C) HIDE HAMBURGER */
      #hamnav label, #hamburger { display: none; }

                      /* [ON SMALL SCREENS] */
      @media screen and (max-width: 768px){
      /* (A) BREAK INTO VERTICAL MENU */
      #hamitems a {
          box-sizing: border-box;
          display: block;
          width: 100%;
          border-top: 1px solid #333;
      }
      
      /* (B) SHOW HAMBURGER ICON */
      #hamnav label { 
          display: inline-block; 
          color: blue;
          background: cyan;
          font-style: normal;
          font-size: 1.2em;
          padding: 10px;
      }

      /* (C) TOGGLE SHOW/HIDE MENU */
      #hamitems { display: none; }
      #hamnav input:checked ~ #hamitems { display: block; }
      }
    </style>

  <div style="overflow: hidden; background-color: cyan; display: block; color: cyan; padding: 14px 20px; text-decoration: none; height: 175px; position: sticky;">
    <div class="navbar">
      <div style="float:left;">
        <div class="padding10 center">
          <a href="https://lorfin19.github.io" class="smallBold">
              <img src="Lorfin & Moosey Logo.png" width="115" height="130" alt class="frame-shadow">
          </a>
      </div>
      </div>
      </div>
    </div>
    <p>YouTube videos to be added soon!</p>
    <iframe width="420" height="315" src="https://www.youtube.com/">
    </iframe>
</html>
